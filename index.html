<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View and compare 80 patterns of strategy from the book Patterns of Strategy by Patrick Hoverstadt" />
    <title>Patterns of Strategy Explorer</title>
    
    <!-- Google Fonts - Bainbridge Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config with Bainbridge Colors -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#1a1814',
              paper: '#f5f0e8',
              'paper-dark': '#ede8dc',
              accent: '#c2410c',
              'accent-light': '#fed7aa',
              mid: '#78716c',
              border: '#d6cfc2',
              card: '#fefcf9',
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['DM Sans', 'sans-serif'],
            },
          }
        }
      }
    </script>
    
    <style>
      body {
        font-family: 'DM Sans', sans-serif;
        background: #f5f0e8;
        color: #1a1814;
      }
      
      /* Custom scrollbar to match aesthetic */
      ::-webkit-scrollbar {
        width: 12px;
      }
      
      ::-webkit-scrollbar-track {
        background: #ede8dc;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #d6cfc2;
        border-radius: 6px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #c2410c;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
